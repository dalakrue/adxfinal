# Copy these values into Streamlit Community Cloud → App settings → Secrets.
# Never commit a real .streamlit/secrets.toml file.

[api_keys]
finnhub = "YOUR_FINNHUB_KEY"
second_api = "YOUR_TWELVE_DATA_OR_SECOND_MARKET_API_KEY"
openrouter = "YOUR_OPENROUTER_API_KEY"

[openrouter]
model = "openrouter/auto"

[automation]
auto_connect = true
auto_run_on_login = false
open_lunch_after_calculation = true
